{% extends 'base.html' %}

{% block title %}Face Setup - SecureFace{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="glass-card" style="text-align: center;">
        <h2 style="font-weight: 800; color: var(--text-main);">Biometric Enrollment</h2>
        <p style="color: var(--text-dim); margin-bottom: 2.5rem; font-size: 1rem;">Please look into the camera to
            register your facial signature.</p>

        <div id="camera-container"
            style="position: relative; width: 100%; max-width: 480px; margin: 0 auto; border-radius: 1.5rem; overflow: hidden; border: 4px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1);">
            <video id="video" width="100%" autoplay playsinline style="background: #000;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="loading-overlay"
                style="display:none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <div class="spinner"
                    style="border: 4px solid #f1f5f9; border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;">
                </div>
                <p style="margin-top: 1.5rem; font-weight: 700; color: var(--text-main);">Analyzing Biometrics...</p>
            </div>
        </div>

        <div id="error-message" style="display:none; color: var(--accent-red); margin-top: 1rem;"></div>

        <form id="face-form" method="post" style="margin-top: 2rem;">
            {% csrf_token %}
            <input type="hidden" name="image_data" id="image_data">
            <button type="button" id="capture-btn" class="btn btn-primary" style="width: 100%;">Capture Face</button>
        </form>
    </div>
</div>

<style>
    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const imageInput = document.getElementById('image_data');
    const faceForm = document.getElementById('face-form');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorMessage = document.getElementById('error-message');

    loadingOverlay.style.display = 'none';

    async function setupCamera(retries = 3) {
        try {
            const constraints = {
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: "user"
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (err) {
            console.error("Error accessing webcam:", err);
            if (retries > 0) {
                setTimeout(() => setupCamera(retries - 1), 1000);
            } else {
                errorMessage.textContent = "Could not access camera. Please ensure you have given permission and are using HTTPS.";
                errorMessage.style.display = 'block';
                loadingOverlay.style.display = 'none';
            }
        }
    }

    captureBtn.addEventListener('click', () => {
        errorMessage.style.display = 'none';
        loadingOverlay.style.display = 'flex';

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const dataURL = canvas.toDataURL('image/jpeg');
        imageInput.value = dataURL;

        // Submit the form
        faceForm.submit();
    });

    setupCamera();
</script>
{% endblock %}
