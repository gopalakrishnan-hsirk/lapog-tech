{% extends 'base.html' %}

{% block title %}Reset Password - SecureFace{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Change Password</h2>
        <form method="post">
            {% csrf_token %}
            <div>
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter new password">
            </div>
            <div>
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                    placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Update
                Password</button>
            <a href="{% url 'dashboard' %}" class="btn"
                style="width: 100%; margin-top: 0.5rem; text-align: center; background: var(--bg-dark);">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
